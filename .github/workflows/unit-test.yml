name: Unit Tests

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  test:
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, 'run tests') &&
      (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'
      )
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.issue.number }}/head

      - name: 🐍 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: 📦 Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: 📦 Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: ${{ runner.os }}-poetry-${{ matrix.python-version }}-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-${{ matrix.python-version }}-

      - name: 📦 Install dependencies with Poetry
        run: poetry install --with dev

      - name: 🔍 Lint with ruff
        run: poetry run ruff check .

      - name: 🧪 Run tests with coverage
        run: |
          export REPORT_BRANCH="$(git rev-parse --abbrev-ref HEAD)"
          export REPORT_COMMIT="$(git rev-parse HEAD)"
          poetry run pytest \
            --cov=pytest_html_plus \
            --cov-fail-under=39 \
            --cov-report=term \
            --cov-report=xml:coverage.xml \
            --reruns 1 \
            --ignore=tests/browser \
            --generate-xml \
            --xml-report final_xml_ubuntu.xml \
            --git-branch "$REPORT_BRANCH" \
            --git-commit "$REPORT_COMMIT" \
            tests/

      - name: 🧪 Run tests with warnings enabled
        run: |
          export REPORT_BRANCH="$(git rev-parse --abbrev-ref HEAD)"
          export REPORT_COMMIT="$(git rev-parse HEAD)"
          PYTHONWARNINGS=error poetry run pytest \
            --cov=pytest_html_plus \
            --cov-fail-under=39 \
            --cov-report=term \
            --reruns 1 \
            --ignore=tests/browser \
            --generate-xml \
            --xml-report final_xml_ubuntu_warnings.xml \
            --html-output=report_output_warnings \
            --git-branch "$REPORT_BRANCH" \
            --git-commit "$REPORT_COMMIT" \
            tests/

      - name: 📤 Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ github.job }}-${{ github.run_number }}-${{ matrix.python-version }}
          path: report_output/

      - name: 📤 Upload HTML Warnings Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-warnings-${{ github.job }}-${{ github.run_number }}-${{ matrix.python-version }}
          path: report_output_warnings/

      - name: 📤 Upload Coverage XML
        if: always() && matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.job }}-${{ github.run_number }}-${{ matrix.python-version }}
          path: coverage.xml

  notify:
    if: always()
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Download Coverage XML
        if: needs.test.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: coverage-test-${{ github.run_number }}-3.11
          path: coverage-artifact

      - name: 📊 Read Coverage Percentage
        if: needs.test.result == 'success'
        id: coverage
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import xml.etree.ElementTree as ET

          tree = ET.parse("coverage-artifact/coverage.xml")
          line_rate = float(tree.getroot().attrib["line-rate"]) * 100
          print(f"value={line_rate:.2f}%")
          PY

      - name: Comment PR with success
        if: needs.test.result == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ Unit Tests passed successfully.\n\nCoverage: ${{ steps.coverage.outputs.value }}\n\nView the logs: ${runUrl}`
            });

      - name: Comment PR with failure
        if: needs.test.result != 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❌ Unit Tests failed.\n\nView the logs: ${runUrl}`
            });
