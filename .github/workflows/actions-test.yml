name: Reporterplus marketplace actions test

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  test:
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, 'run tests') &&
      (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'
      )
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: [ "3.13" ]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3
        with:
          ref: refs/pull/${{ github.event.issue.number }}/merge

      - name: 🐍 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: 📦 Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: 📦 Install dependencies with Poetry and install playwright
        run: |
          poetry lock
          poetry install --with dev
          poetry run playwright install --with-deps
      
      - name: 🧪 Run playwright test and generate report using marketplace plugin
        uses: reporterplus/pytest-html-plus-action@v2
        with:
          htmloutput: "report_output_playwright"
          capturescreenshots: "all"
          testpath: "tests/browser/test_playwright.py"
          usepoetry: "true"
          xmlreport: "report.xml"
          gitbranch: "$(git rev-parse --abbrev-ref HEAD)"

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-${{ github.job }}-${{ github.run_number }}-${{ matrix.python-version }}
          path: |
            report_output_playwright/

  notify:
    if: always()
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Comment PR with success
        if: needs.test.result == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ Marketplace action tests passed successfully.\n\nView the logs: ${runUrl}`
            });

      - name: Comment PR with failure
        if: needs.test.result != 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❌ Marketplace action tests failed.\n\nView the logs: ${runUrl}`
            });
