version: 1

rules:
  - type: timeout
    priority: 1
    match:
      - "timeout"
      - "timed out"

  - type: network
    priority: 2
    match:
      - "connection refused"
      - "network"
      - "dns"

  - type: api
    priority: 3
    match:
      - "500"
      - "internal server error"
      - "api"

  - type: ui
    priority: 4
    match:
      - "element"
      - "selector"
      - "not found"

  - type: assertion
    priority: 5
    match:
      - "assert"
      - "assertionerror"

defaults:
  fallback_type: "other"